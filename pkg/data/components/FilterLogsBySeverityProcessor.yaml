kind: FilterLogBySeverity
name: Log Severity Filter
style: processor
type: base
status: development
version: v0.0.0
summary: This processor can be used to filter OpenTelemetry by their severity level.
description: |
  Filters logs using the `severity_number` attribute supplied on the logs.
tags:
  - category:processor
  - service:collector
  - category:filter
  - signal:OTelLogs
ports:
  - name: Logs
    direction: input
    type: OTelLogs
  - name: Logs
    direction: output
    type: OTelLogs
properties:
  - name: Severity
    type: string
    subtype: oneof(Trace,Debug,Info,Warn,Error)
    default: Warn
    validations:
      - oneof(Trace,Debug,Info,Warn,Error)
templates:
  - kind: collector_config
    name: otel_filter
    format: collector
    meta:
      componentSection: processors
      signalTypes: [logs]
      collectorComponentName: filter
    data:
      - key: "{{ .ComponentName }}.error_mode"
        value: "ignore"
      - key: "{{ .ComponentName }}.logs.log_record[0]"
        value: "'severity_number < SEVERITY_NUMBER_{{ .HProps.Severity | upper }}'"
        suppress_if: "{{ not .HProps.Type }}"